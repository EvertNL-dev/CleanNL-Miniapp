<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CleanNL Mini App v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="storefront">
  <main class="container">
    <div class="topbar">
      <button class="pill">✕ Sluit</button>
      <button class="pill">75⚡</button>
    </div>

    <section class="hero">
      <div class="logo">CLEAN<br>BOT</div>
      <div class="profile">
        <div class="avatar" id="userInitials">E</div>
        <div>
          <small>Welcome</small>
          <h1 id="userName">Evert</h1>
        </div>
      </div>
      <div class="stats">
        <div class="stat" id="count">0 products</div>
        <div class="stat">Premium catalog</div>
      </div>
    </section>

    <section class="filters">
      <select id="category" class="select">
        <option value="">Alle categorieën</option>
      </select>
      <select id="farm" class="select">
        <option value="">Alle farms</option>
      </select>
    </section>

    <section id="grid" class="grid"></section>
  </main>
<div id="productModal" class="product-modal" aria-hidden="true">
  <div class="product-modal__backdrop" data-close-modal></div>
  <div class="product-modal__sheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="product-modal__close" data-close-modal aria-label="Sluiten">×</button>
    <img id="modalImage" class="product-modal__image" src="" alt="">
    <div class="product-modal__content">
      <div class="badge" id="modalBrand">Brand</div>
      <h2 id="modalTitle" class="product-modal__title">Product</h2>
      <p id="modalDescription" class="product-modal__description">Beschrijving</p>
      <div id="modalCategory" class="meta">Categorie</div>

      <div class="product-modal__block">
        <div class="product-modal__label">Kies hoeveelheid</div>
        <div id="modalVariants" class="variant-row"></div>
      </div>

      <div class="product-modal__footer">
        <div>
          <div class="meta">Prijs</div>
          <div id="modalPrice" class="price">€0</div>
        </div>
        <button class="btn">Toevoegen</button>
      </div>
    </div>
  </div>
</div>
  <nav class="nav" aria-label="Navigatie">
    <a href="#" class="active">Home</a>
    <a href="#">Info</a>
    <a href="#">Cart</a>
    <a href="#">Reviews</a>
    <a href="#">Profile</a>
  </nav>

  <script src="./data.js"></script>
  <script src="./storage.js"></script>
  <script src="./app.js" defer></script>
</body>
</html>
