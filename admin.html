<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beheer — Keukenwinkel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F1F3EE; --card: #FFFFFF; --ink: #20242A; --ink-soft: #5B6259;
    --delft: #2C4A6E; --delft-light: #4C6D91; --copper: #A8672E; --hairline: #DADFD5;
    --red: #B23A3A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif; padding: 20px 16px 60px;
    max-width: 640px; margin-inline: auto;
  }
  h1 {
    font-family: 'Fraunces', serif; font-weight: 700; font-size: 24px; margin: 6px 0 2px;
  }
  .sub { color: var(--ink-soft); font-size: 13px; margin: 0 0 20px; }
  label { display: block; font-size: 12.5px; font-weight: 500; color: var(--ink-soft); margin: 12px 0 5px; }
  input, textarea, select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--hairline); border-radius: 8px;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; background: #fff; color: var(--ink);
  }
  textarea { resize: vertical; min-height: 50px; }
  button {
    font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; font-size: 14px;
    padding: 11px 18px; border-radius: 8px; border: none; cursor: pointer;
  }
  .btn-primary { background: var(--delft); color: #fff; }
  .btn-primary:disabled { background: #A9B4BE; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--delft); border: 1px solid var(--hairline); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid #E9CACA; }
  .card {
    background: var(--card); border: 1px solid var(--hairline); border-radius: 12px;
    padding: 16px; margin-bottom: 14px;
  }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  .cat-header {
    display: flex; justify-content: space-between; align-items: center;
    margin: 26px 0 10px;
  }
  .cat-header h2 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px; margin: 0;
  }
  .product-row {
    display: flex; gap: 10px; align-items: flex-start; padding: 12px 0;
    border-top: 1px solid var(--hairline);
  }
  .product-row:first-of-type { border-top: none; }
  .product-row img {
    width: 52px; height: 52px; border-radius: 8px; object-fit: cover; background: var(--bg); flex-shrink: 0;
  }
  .product-fields { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .product-fields .row2 { display: flex; gap: 6px; }
  .status {
    position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px;
    font-size: 13px; text-align: center; font-weight: 500;
  }
  .status.ok { background: #E4EEE1; color: #2E5A2A; }
  .status.err { background: #F6E3E3; color: var(--red); }
  .status.busy { background: #EFEBE0; color: var(--copper); }
  #loginScreen, #panel { display: none; }
  .hint { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }
  .toolbar { display: flex; gap: 8px; margin-top: 20px; }
  .price-input { font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>

<h1>Beheer producten</h1>
<p class="sub">Keukenwinkel — adminpaneel</p>

<div id="loginScreen">
  <div class="card">
    <label for="token">GitHub Personal Access Token</label>
    <input type="password" id="token" placeholder="ghp_...">
    <p class="hint">Blijft alleen lokaal in deze browser opgeslagen.</p>

    <label for="owner">GitHub gebruikersnaam</label>
    <input type="text" id="owner" value="EvertNL-dev">

    <label for="repo">Repository naam</label>
    <input type="text" id="repo" value="CleanNL-Miniapp">

    <button class="btn-primary" style="margin-top:16px; width:100%;" onclick="loadData()">Inloggen &amp; producten laden</button>
  </div>
</div>

<div id="panel">
  <div id="categories"></div>

  <div class="toolbar">
    <button class="btn-ghost" onclick="addCategory()">+ Nieuwe categorie</button>
  </div>

  <div class="toolbar">
    <button class="btn-primary" id="saveBtn" onclick="saveData()">Wijzigingen opslaan</button>
    <button class="btn-ghost" onclick="logout()">Uitloggen</button>
  </div>
</div>

<div id="status"></div>

<script>
  let data = null;
  let sha = null;

  function creds() {
    return {
      token: sessionStorage.getItem('gh_token'),
      owner: sessionStorage.getItem('gh_owner'),
      repo: sessionStorage.getItem('gh_repo'),
    };
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + (type || '');
    if (type === 'ok') setTimeout(() => { el.textContent = ''; el.className = 'status'; }, 3000);
  }

  async function loadData() {
    const token = document.getElementById('token').value.trim();
    const owner = document.getElementById('owner').value.trim();
    const repo = document.getElementById('repo').value.trim();
    if (!token || !owner || !repo) { setStatus('Vul alle velden in.', 'err'); return; }

    sessionStorage.setItem('gh_token', token);
    sessionStorage.setItem('gh_owner', owner);
    sessionStorage.setItem('gh_repo', repo);

    setStatus('Producten laden…', 'busy');
    try {
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/products.json`, {
        headers: { Authorization: `token ${token}` }
      });
      if (!res.ok) throw new Error(res.status === 404 ? 'products.json niet gevonden in deze repository.' : 'Kon niet inloggen — controleer je token en repogegevens.');
      const json = await res.json();
      sha = json.sha;
      data = JSON.parse(decodeURIComponent(escape(atob(json.content))));
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      renderCategories();
      setStatus('Producten geladen.', 'ok');
    } catch (e) {
      setStatus(e.message, 'err');
    }
  }

  function logout() {
    sessionStorage.clear();
    location.reload();
  }

  function renderCategories() {
    const wrap = document.getElementById('categories');
    wrap.innerHTML = data.categorieen.map((cat, ci) => `
      <div class="cat-header">
        <h2><input type="text" value="${escapeAttr(cat.naam)}" oninput="data.categorieen[${ci}].naam=this.value" style="border:none;background:transparent;font:inherit;padding:0;width:auto;max-width:60vw;"></h2>
        <button class="btn-danger" onclick="removeCategory(${ci})">Verwijder categorie</button>
      </div>
      <div class="card">
        ${cat.producten.map((p, pi) => productRow(p, ci, pi)).join('') || '<p class="hint">Nog geen producten in deze categorie.</p>'}
        <button class="btn-ghost" style="margin-top:10px;" onclick="addProduct(${ci})">+ Product toevoegen</button>
      </div>
    `).join('');
  }

  function productRow(p, ci, pi) {
    return `
      <div class="product-row">
        <img src="${p.afbeelding || ''}" onerror="this.style.opacity=0.2">
        <div class="product-fields">
          <input type="text" value="${escapeAttr(p.naam)}" placeholder="Productnaam"
            oninput="data.categorieen[${ci}].producten[${pi}].naam=this.value">
          <textarea placeholder="Beschrijving" rows="2"
            oninput="data.categorieen[${ci}].producten[${pi}].beschrijving=this.value">${p.beschrijving || ''}</textarea>
          <div class="row2">
            <input class="price-input" type="number" step="0.01" value="${p.prijs}" placeholder="Prijs" style="max-width:110px;"
              oninput="data.categorieen[${ci}].producten[${pi}].prijs=parseFloat(this.value)||0">
            <input type="text" value="${escapeAttr(p.afbeelding || '')}" placeholder="Afbeelding URL"
              oninput="data.categorieen[${ci}].producten[${pi}].afbeelding=this.value; this.previousElementSibling; refreshThumb(this)">
          </div>
        </div>
        <button class="btn-danger" style="align-self:flex-start;" onclick="removeProduct(${ci},${pi})">✕</button>
      </div>`;
  }

  function refreshThumb(input) {
    const img = input.closest('.product-row').querySelector('img');
    img.src = input.value;
    img.style.opacity = 1;
  }

  function escapeAttr(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  }

  function addCategory() {
    const naam = prompt('Naam van de nieuwe categorie:');
    if (!naam) return;
    data.categorieen.push({
      id: 'cat_' + Date.now(),
      naam,
      producten: []
    });
    renderCategories();
  }

  function removeCategory(ci) {
    if (!confirm('Deze categorie en alle producten erin verwijderen?')) return;
    data.categorieen.splice(ci, 1);
    renderCategories();
  }

  function addProduct(ci) {
    data.categorieen[ci].producten.push({
      id: 'p_' + Date.now(),
      naam: 'Nieuw product',
      beschrijving: '',
      prijs: 0,
      afbeelding: ''
    });
    renderCategories();
  }

  function removeProduct(ci, pi) {
    if (!confirm('Dit product verwijderen?')) return;
    data.categorieen[ci].producten.splice(pi, 1);
    renderCategories();
  }

  async function saveData() {
    const { token, owner, repo } = creds();
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    setStatus('Opslaan…', 'busy');
    try {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/products.json`, {
        method: 'PUT',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: 'Producten bijgewerkt via adminpaneel',
          content,
          sha,
        })
      });
      if (!res.ok) throw new Error('Opslaan mislukt — controleer je token-rechten.');
      const json = await res.json();
      sha = json.content.sha;
      setStatus('Opgeslagen! De site werkt dit binnen een minuut bij.', 'ok');
    } catch (e) {
      setStatus(e.message, 'err');
    } finally {
      btn.disabled = false;
    }
  }

  // Auto-login if we already have credentials this session
  (function init() {
    const { token, owner, repo } = creds();
    if (token && owner && repo) {
      document.getElementById('token').value = token;
      document.getElementById('owner').value = owner;
      document.getElementById('repo').value = repo;
      loadData();
    } else {
      document.getElementById('loginScreen').style.display = 'block';
    }
  })();
</script>

</body>
</html>
