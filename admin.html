<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="admin-wrap">
    <header class="admin-header">
      <div>
        <h1>Admin</h1>
        <p>Producten beheren, media uploaden en opslaan.</p>
      </div>
      <div class="actions">
        <button id="resetData" type="button" class="btn-secondary">Herlaad data</button>
        <button id="addCategory" type="button" class="btn-secondary">+ Categorie toevoegen</button>
        <button id="save" type="button" class="btn">Opslaan</button>
      </div>
    </header>

    <section class="panel">
      <h2>Cloudinary instellingen</h2>
      <p>Vul deze eenmalig in via opslag in <code>cld-config</code> of voeg hier later een klein config-formulier toe.</p>
      <div id="categories"></div>
    </section>
  </main>

  <script src="admin.js" defer></script>
</body>
</html>
