<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keukenwinkel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F1F3EE;
    --card: #FFFFFF;
    --ink: #20242A;
    --ink-soft: #5B6259;
    --delft: #2C4A6E;
    --delft-light: #4C6D91;
    --copper: #A8672E;
    --hairline: #DADFD5;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 40px;
  }

  header {
    padding: 28px 20px 22px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: "";
    position: absolute;
    top: -30px; right: -30px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--delft-light) 0%, transparent 70%);
    opacity: 0.15;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--delft);
    margin: 0 0 6px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 30px;
    line-height: 1.1;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }

  .sub {
    color: var(--ink-soft);
    font-size: 14px;
    margin: 0;
    max-width: 34ch;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    padding: 4px 16px 0;
  }

  @media (min-width: 480px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }

  .card {
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    transition: transform 0.15s ease;
  }

  .card:active { transform: scale(0.98); }

  .tile-mark {
    position: absolute;
    top: 0; left: 0;
    width: 22px; height: 22px;
    z-index: 2;
  }

  .tile-mark svg { display: block; }

  .thumb {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    background: var(--bg);
  }

  .card-body {
    padding: 14px 14px 16px;
  }

  .card-body h3 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 17px;
    margin: 0 0 4px;
    line-height: 1.25;
  }

  .card-body p {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 12px;
    line-height: 1.45;
  }

  .price {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--copper);
    background: #FBF3EA;
    border: 1px solid #EBD9C4;
    padding: 4px 10px;
    border-radius: 999px;
  }

  footer {
    text-align: center;
    padding: 26px 20px 8px;
    color: var(--ink-soft);
    font-size: 12px;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Keukenwinkel &middot; Catalogus</p>
  <h1>Onze keukenproducten</h1>
  <p class="sub">Een overzicht van wat we in de shop hebben. Bestellen doe je (nog) niet hier.</p>
</header>

<div class="grid" id="grid">
  <div class="loading">Producten laden…</div>
</div>

<footer>Keukenwinkel</footer>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const tileMark = `
    <div class="tile-mark">
      <svg width="22" height="22" viewBox="0 0 22 22">
        <path d="M0 0 A22 22 0 0 1 22 0 L22 4 A18 18 0 0 0 0 4 Z" fill="#2C4A6E" opacity="0.85"/>
      </svg>
    </div>`;

  function renderProducts(products) {
    const grid = document.getElementById('grid');
    if (!products.length) {
      grid.innerHTML = '<div class="loading">Nog geen producten toegevoegd.</div>';
      return;
    }
    grid.innerHTML = products.map(p => `
      <div class="card">
        ${tileMark}
        <img class="thumb" src="${p.afbeelding}" alt="${p.naam}" loading="lazy">
        <div class="card-body">
          <h3>${p.naam}</h3>
          <p>${p.beschrijving}</p>
          <span class="price">${p.prijs}</span>
        </div>
      </div>
    `).join('');
  }

  fetch('products.json')
    .then(r => r.json())
    .then(renderProducts)
    .catch(() => {
      document.getElementById('grid').innerHTML =
        '<div class="loading">Kon producten niet laden. Controleer products.json.</div>';
    });
</script>

</body>
</html>
